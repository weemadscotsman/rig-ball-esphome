substitutions:
  name: xiaozhi-ball-v2
  friendly_name: "Ball v2 OpenClaw"
  
  imagewidth: "240"
  imageheight: "240"
  
  # Ball v2 pins
  sda_pin: "15"
  scl_pin: "14"
  i2s_lrclk: "45"
  i2s_bclk: "9"
  i2s_mclk: "16"
  i2s_din: "10"
  i2s_dout: "8"
  speaker_en: "46"
  touch_int: "12"
  touch_rst: "6"
  backlight: "42"
  lcd_cs: "5"
  lcd_dc: "47"
  lcd_rst: "38"
  spi_clk: "4"
  spi_mosi: "2"
  button: "0"
  led: "48"
  battery: "1"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Ball v2 Setup"
    password: "12345678"

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

logger:
  level: INFO

# I2C for touch
i2c:
  sda: GPIO${sda_pin}
  scl: GPIO${scl_pin}
  scan: true

# I2S bus configuration
i2s_audio:
  i2s_lrclk_pin: GPIO${i2s_lrclk}
  i2s_bclk_pin: GPIO${i2s_bclk}

# Touch screen
touchscreen:
  - platform: cst816
    interrupt_pin: GPIO${touch_int}
    reset_pin: GPIO${touch_rst}
    on_touch:
      then:
        - voice_assistant.start:

# Speaker
speaker:
  - platform: i2s_audio
    id: board_speaker
    i2s_dout_pin: GPIO${i2s_dout}
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left

# Microphone
microphone:
  - platform: i2s_audio
    id: board_mic
    i2s_din_pin: GPIO${i2s_din}
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: left
    adc_type: external

# Voice Assistant -> HA -> OpenClaw
voice_assistant:
  id: va
  microphone: board_mic
  speaker: board_speaker
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    - logger.log: "Listening..."
  on_stt_end:
    - logger.log:
        format: "Heard: %s"
        args: ["x.c_str()"]
  on_tts_start:
    - logger.log:
        format: "Response: %s"
        args: ["x.c_str()"]

# Display - GC9A01A round
display:
  - platform: ili9xxx
    id: ball_display
    model: GC9A01A
    cs_pin: GPIO${lcd_cs}
    dc_pin: GPIO${lcd_dc}
    reset_pin: GPIO${lcd_rst}
    spi_id: spi_bus
    invert_colors: true
    dimensions:
      width: 240
      height: 240
    update_interval: 1s
    lambda: |-
      it.fill(Color::BLACK);
      it.print(120, 100, id(font_main), TextAlign::CENTER, "OpenClaw");
      it.print(120, 130, id(font_small), TextAlign::CENTER, "Say 'OK Nabu'");

spi:
  id: spi_bus
  clk_pin: GPIO${spi_clk}
  mosi_pin: GPIO${spi_mosi}

font:
  - file:
      type: gfonts
      family: Roboto
      weight: 400
    id: font_main
    size: 24
  - file:
      type: gfonts
      family: Roboto
      weight: 400
    id: font_small
    size: 16

# RGB LED
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO${led}
    chipset: WS2812
    num_leds: 1
    rgb_order: grb

# Battery sensor
sensor:
  - platform: adc
    pin: GPIO${battery}
    name: "Battery Voltage"
    attenuation: 12db
    filters:
      - multiply: 2.0

# Button
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO${button}
      mode: INPUT_PULLUP
      inverted: true
    name: "Main Button"
    on_press:
      - voice_assistant.start:
