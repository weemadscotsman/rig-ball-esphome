text_sensor:
  - id: text_request
    platform: template
    on_value:
      lambda: |-
        if (id(text_request).state.length() > 32) {
          std::string name = id(text_request).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(), 31);
          id(text_request).state = (truncated + "...").c_str();
        }
  - id: text_response
    platform: template
    on_value:
      lambda: |-
        if (id(text_response).state.length() > 32) {
          std::string name = id(text_response).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(), 31);
          id(text_response).state = (truncated + "...").c_str();
        }
  - platform: template
    name: "Voice Request"
    id: text_request_display
    icon: "mdi:microphone"
    lambda: return id(text_request).state;
  - platform: template
    name: "Voice Response"
    id: text_response_display
    icon: "mdi:account-voice"
    lambda: return id(text_response).state;
  - platform: template
    name: "Wake Word"
