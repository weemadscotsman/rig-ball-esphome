name: Build Rig Firmware

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install ESPHome
        run: |
          pip install esphome==2026.3.2
          esphome version
      
      - name: Create secrets.yaml
        run: |
          cat > secrets.yaml << 'EOF'
          wifi_ssid: "DUMMY_SSID"
          wifi_password: "DUMMY_PASSWORD"
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          EOF
      
      - name: Compile firmware
        run: |
          esphome compile ball_v2_arduino.yaml
      
      - name: Find firmware file
        id: find-firmware
        run: |
          FIRMWARE_PATH=$(find . -name "firmware.bin" -path "*/.esphome/build/*" | head -1)
          echo "Found firmware at: $FIRMWARE_PATH"
          echo "path=$FIRMWARE_PATH" >> $GITHUB_OUTPUT
      
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: rig-ball-firmware
          path: ${{ steps.find-firmware.outputs.path }}
